<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFG Statsheet — {% block page_title %}{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red: #c8102e;
    --red-dim: #7a0a1c;
    --red-glow: rgba(200, 16, 46, 0.15);
    --bg: #050505;
    --surface: rgba(255,255,255,0.03);
    --border: rgba(200,16,46,0.2);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Crimson Pro', Georgia, serif;
    color: #ccc;
    overflow-x: hidden;
  }

  /* ── Canvas background ── */
  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Layout ── */
  .shell {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header bar ── */
  header {
    width: 100%;
    padding: 1.4rem 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(to bottom, rgba(5,5,5,0.9), transparent);
    backdrop-filter: blur(4px);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.12em;
    color: #fff;
    text-shadow: 0 0 18px var(--red);
    flex-shrink: 0;
  }

  .logo span { color: var(--red); }

  /* ── Hamburger (mobile only) ── */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
    background: none;
    border: none;
    z-index: 101;
  }

  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: #fff;
    border-radius: 2px;
    transition: transform 0.3s, opacity 0.3s;
  }

  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* ── Nav ── */
  nav { display: flex; gap: 2.4rem; }

  nav a {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.14em;
    color: #888;
    text-decoration: none;
    transition: color 0.25s;
    position: relative;
    white-space: nowrap;
  }

  nav a::after {
    content: '';
    position: absolute;
    left: 0; bottom: -3px;
    width: 0; height: 1px;
    background: var(--red);
    transition: width 0.3s;
  }

  nav a:hover  { color: #fff; }
  nav a:hover::after { width: 100%; }
  nav a.active { color: #fff; }
  nav a.active::after { width: 100%; }

  /* ── Page title row ── */
  .page-title-row {
    width: 100%;
    max-width: 1500px;
    padding: 2.5rem 3rem 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 2rem;
  }

  .page-title h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 0.12em;
    color: #fff;
    text-shadow: 0 0 30px rgba(200,16,46,0.4);
    line-height: 1;
  }

  .page-title h1 span { color: var(--red); }

  /* ── Division tabs ── */
  .tabs {
    display: flex;
    align-items: flex-end;
    gap: 0;
  }

  .tab {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.88rem;
    letter-spacing: 0.16em;
    padding: 0.6rem 1.6rem;
    cursor: pointer;
    color: #555;
    border: 1px solid rgba(200,16,46,0.15);
    border-bottom: none;
    background: transparent;
    transition: color 0.2s, background 0.2s, border-color 0.2s;
    position: relative;
    top: 1px;
    user-select: none;
    white-space: nowrap;
  }

  .tab:first-child { border-radius: 3px 0 0 0; }
  .tab:last-child  { border-radius: 0 3px 0 0; border-left: none; }

  .tab:hover { color: #ccc; background: rgba(200,16,46,0.05); }

  .tab.active {
    color: #fff;
    background: rgba(200,16,46,0.12);
    border-color: rgba(200,16,46,0.4);
    border-bottom: 1px solid var(--bg);
  }

  /* ── Title rule ── */
  .page-title-rule {
    width: 100%;
    max-width: 1500px;
    padding: 0 3rem;
  }

  .page-title-rule-line {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, var(--red), rgba(200,16,46,0.2), transparent);
  }

  /* ── Main ── */
  main {
    flex: 1;
    width: 100%;
    max-width: 1500px;
    padding: 4rem 3rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
  }

  /* ── Decorative rule ── */
  .rule {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .rule-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--red-dim), transparent);
  }

  .rule-diamond {
    width: 6px; height: 6px;
    background: var(--red);
    transform: rotate(45deg);
    box-shadow: 0 0 8px var(--red);
  }

  /* ── Tab panels ── */
  .tab-panel { display: none; width: 100%; }
  .tab-panel.active { display: contents; }

  /* ── Table container ── */
  .table-container {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    box-shadow:
      0 0 0 1px rgba(200,16,46,0.05),
      0 8px 60px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.04);
    backdrop-filter: blur(8px);
    padding: 2.5rem;
    position: relative;
    overflow: auto;
    min-height: 420px;
    box-sizing: border-box;
  }

  .table-container::before,
  .table-container::after {
    content: '';
    position: absolute;
    width: 24px; height: 24px;
    border-color: var(--red);
    border-style: solid;
    opacity: 0.6;
    pointer-events: none;
  }

  .table-container::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
  .table-container::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

  /* ── Table ── */
  table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 1rem;
    border: 1px solid rgba(200,16,46,0.25);
    table-layout: auto;
  }

  thead tr {
    background: rgba(200,16,46,0.15);
    border-bottom: 2px solid var(--red);
  }

  thead th {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.82rem;
    letter-spacing: 0.18em;
    color: #ff4a60;
    text-align: center;
    padding: 0.9rem 1.1rem;
    text-transform: uppercase;
    border-right: 1px solid rgba(200,16,46,0.25);
  }

  thead th:first-child { text-align: left; }
  thead th:last-child  { border-right: none; }

  /* ── Sortable column headers ── */
  thead th.sortable {
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  thead th.sortable:hover {
    background: rgba(200,16,46,0.1);
    color: #fff;
  }

  .sort-icon {
    display: inline-flex;
    flex-direction: column;
    gap: 1px;
    vertical-align: middle;
    margin-left: 5px;
    opacity: 0.35;
    transition: opacity 0.2s;
    line-height: 1;
  }

  .sort-icon .arrow-up,
  .sort-icon .arrow-down {
    display: block;
    width: 0;
    height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
  }

  .sort-icon .arrow-up   { border-bottom: 5px solid currentColor; }
  .sort-icon .arrow-down { border-top:    5px solid currentColor; }

  thead th.sortable:hover .sort-icon { opacity: 0.7; }

  thead th.sort-asc  .sort-icon,
  thead th.sort-desc .sort-icon { opacity: 1; }

  thead th.sort-asc  .arrow-up   { color: var(--red); }
  thead th.sort-asc  .arrow-down { opacity: 0.25; }
  thead th.sort-desc .arrow-down { color: var(--red); }
  thead th.sort-desc .arrow-up   { opacity: 0.25; }

  /* ── Username link hover underline ── */
  tbody td:first-child a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s, color 0.2s;
  }

  tbody td:first-child a:hover {
    color: #fff;
    border-bottom-color: var(--red);
  }

  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.06);
    transition: background 0.15s;
  }

  tbody tr:nth-child(even) { background: rgba(255,255,255,0.025); }
  tbody tr:hover            { background: rgba(200,16,46,0.09); }

  tbody td {
    padding: 0.75rem 1.1rem;
    color: #d0d0d0;
    vertical-align: middle;
    text-align: center;
    border-right: 1px solid rgba(255,255,255,0.05);
    font-size: 0.97rem;
    letter-spacing: 0.02em;
  }

  tbody td:first-child {
    text-align: left;
    color: #fff;
    font-weight: 300;
    border-right: 1px solid rgba(200,16,46,0.3);
  }

  tbody td:last-child { border-right: none; }

  tfoot tr {
    border-top: 2px solid var(--red);
    background: rgba(200,16,46,0.1);
  }

  tfoot td {
    padding: 0.8rem 1.1rem;
    color: #ff4a60;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.14em;
    text-align: center;
    border-right: 1px solid rgba(200,16,46,0.2);
  }

  tfoot td:first-child { text-align: left; }
  tfoot td:last-child  { border-right: none; }

  /* ── Footer ── */
  footer {
    width: 100%;
    padding: 1.2rem 3rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to top, rgba(5,5,5,0.9), transparent);
    backdrop-filter: blur(4px);
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    color: #444;
  }

  footer .dot { color: var(--red); margin: 0 0.5rem; }

  /* ── Animations ── */
  .fade-up {
    opacity: 0;
    transform: translateY(24px);
    animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  .fade-up:nth-child(1) { animation-delay: 0.1s; }
  .fade-up:nth-child(2) { animation-delay: 0.25s; }
  .fade-up:nth-child(3) { animation-delay: 0.4s; }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  /* ════════════════════════════════
     MOBILE  (≤ 768px)
  ════════════════════════════════ */
  @media (max-width: 768px) {

    header {
      padding: 1rem 1.2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(5,5,5,0.97);
    }

    .logo { font-size: 1.3rem; }

    /* Show hamburger, hide desktop nav */
    .hamburger { display: flex; }

    nav {
      display: none;
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      flex-direction: column;
      gap: 0;
      background: rgba(5,5,5,0.98);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 0;
      z-index: 99;
    }

    nav.open { display: flex; }

    nav a {
      padding: 0.85rem 1.5rem;
      font-size: 1rem;
      border-bottom: 1px solid rgba(200,16,46,0.08);
    }

    nav a::after { display: none; }

    /* Title row stacks vertically */
    .page-title-row {
      flex-direction: column;
      align-items: flex-start;
      padding: 1.5rem 1.2rem 0;
      gap: 1rem;
    }

    .page-title h1 { font-size: 2rem; }

    .tabs { width: 100%; }

    .tab {
      flex: 1;
      text-align: center;
      padding: 0.55rem 0.8rem;
      font-size: 0.78rem;
    }

    .page-title-rule { padding: 0 1.2rem; }

    main { padding: 2rem 1.2rem; }

    .table-container {
      padding: 1rem 0.8rem;
      min-height: 300px;
      /* horizontal scroll on mobile for wide tables */
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    thead th { padding: 0.65rem 0.6rem; font-size: 0.72rem; letter-spacing: 0.1em; }
    tbody td { padding: 0.6rem 0.6rem; font-size: 0.85rem; }
    tfoot td  { padding: 0.6rem 0.6rem; font-size: 0.7rem; }

    .rule { margin-bottom: 0.5rem; }

    footer { padding: 1rem 1.2rem; flex-direction: column; gap: 0.3rem; text-align: center; }
  }

  /* ════════════════════════════════
     SMALL MOBILE (≤ 480px)
  ════════════════════════════════ */
  @media (max-width: 480px) {
    .page-title h1 { font-size: 1.6rem; }
    thead th { font-size: 0.65rem; padding: 0.5rem 0.4rem; }
    tbody td { font-size: 0.8rem;  padding: 0.5rem 0.4rem; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="shell">

  <header>
    <div class="logo">AFG<span> </span>Statsheet</div>
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
    <nav id="main-nav">
      <a href="/"      {% if active_page == 'qb'      %}class="active"{% endif %}>QB</a>
      <a href="/wr"    {% if active_page == 'wr'      %}class="active"{% endif %}>WR</a>
      <a href="/db"    {% if active_page == 'db'      %}class="active"{% endif %}>DB</a>
      <a href="/rb"    {% if active_page == 'rb'      %}class="active"{% endif %}>RB</a>
      <a href="/def"   {% if active_page == 'def'     %}class="active"{% endif %}>Defender</a>
      <a href="/kicker"{% if active_page == 'kicker'  %}class="active"{% endif %}>Kicker</a>
    </nav>
  </header>

  <div class="page-title-row">
    <div class="page-title">
      <h1>{% block heading %}{% endblock %}</h1>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="div1">Division 1</div>
      <div class="tab"        data-tab="div2">Division 2</div>
    </div>
  </div>

  <div class="page-title-rule">
    <div class="page-title-rule-line"></div>
  </div>

  <main>
    <div class="rule fade-up">
      <div class="rule-line"></div>
      <div class="rule-diamond"></div>
      <div class="rule-line"></div>
    </div>

    {% block content %}{% endblock %}

    <div class="rule fade-up" style="transform:scaleX(-1);">
      <div class="rule-line"></div>
      <div class="rule-diamond"></div>
      <div class="rule-line"></div>
    </div>
  </main>

  <footer>
    <span>Random. © 2026</span>
    <span><span class="dot">◆</span></span>
    <span>v1.0</span>
  </footer>

</div>

<script>
// ── Hamburger toggle ──
const hamburger = document.getElementById('hamburger');
const mainNav   = document.getElementById('main-nav');

hamburger.addEventListener('click', () => {
  hamburger.classList.toggle('open');
  mainNav.classList.toggle('open');
});

// Close nav when a link is tapped on mobile
mainNav.querySelectorAll('a').forEach(a => {
  a.addEventListener('click', () => {
    hamburger.classList.remove('open');
    mainNav.classList.remove('open');
  });
});
</script>

<script>
// ── Tab toggle ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const target = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + target).classList.add('active');
  });
});
</script>

<script>
// ── Column sorting ──
function initSortableTable(table) {
  const headers = table.querySelectorAll('thead th');

  headers.forEach((th, colIndex) => {
    // Add sortable class and icon to every header
    th.classList.add('sortable');
    const icon = document.createElement('span');
    icon.className = 'sort-icon';
    icon.innerHTML = '<span class="arrow-up"></span><span class="arrow-down"></span>';
    th.appendChild(icon);

    let sortDir = null; // null | 'asc' | 'desc'

    th.addEventListener('click', () => {
      // Cycle: null → desc → asc → desc …
      sortDir = sortDir === 'desc' ? 'asc' : 'desc';

      // Reset all other headers
      headers.forEach(h => {
        h.classList.remove('sort-asc', 'sort-desc');
      });
      th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');

      const tbody = table.querySelector('tbody');
      const rows  = Array.from(tbody.querySelectorAll('tr'));

      rows.sort((a, b) => {
        const aCell = a.cells[colIndex];
        const bCell = b.cells[colIndex];
        if (!aCell || !bCell) return 0;

        const aText = aCell.innerText.trim();
        const bText = bCell.innerText.trim();

        // Try numeric comparison first
        const aNum = parseFloat(aText.replace(/[^0-9.\-]/g, ''));
        const bNum = parseFloat(bText.replace(/[^0-9.\-]/g, ''));

        let result;
        if (!isNaN(aNum) && !isNaN(bNum)) {
          result = aNum - bNum;
        } else {
          result = aText.localeCompare(bText);
        }

        return sortDir === 'asc' ? result : -result;
      });

      rows.forEach(row => tbody.appendChild(row));
    });
  });
}

// Init on all current tables, and re-init whenever a tab panel becomes visible
document.querySelectorAll('table').forEach(initSortableTable);

// Re-run for tables that might be inside hidden tab panels (they're in the DOM already)
// The sort still works because we target the actual <table> elements directly.
</script>

<script>
// ── Flowing lines ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const RIBBON_COUNT = 28;
const ribbons = [];

function rand(a, b) { return a + Math.random() * (b - a); }

class Ribbon {
  constructor() { this.reset(true); }

  reset(initial) {
    this.x     = initial ? rand(0, W) : (Math.random() < 0.5 ? -60 : W + 60);
    this.y     = rand(0, H);
    this.vx    = rand(0.4, 1.1) * (Math.random() < 0.5 ? 1 : -1);
    this.vy    = rand(-0.5, 0.5);
    this.width = rand(1.2, 5.5);
    this.length = rand(220, 520);
    this.hue   = Math.random() < 0.8 ? 0 : 12;
    this.sat   = rand(85, 100);
    this.lit   = rand(38, 62);
    this.alpha = rand(0.35, 0.78);
    this.tail  = [];
    this.maxTail = Math.floor(this.length);
    this.curve = rand(0.002, 0.007) * (Math.random() < 0.5 ? 1 : -1);
  }

  update() {
    this.vy += this.curve;
    this.x  += this.vx;
    this.y  += this.vy;
    this.tail.push({ x: this.x, y: this.y });
    if (this.tail.length > this.maxTail) this.tail.shift();
    if (this.x < -200 || this.x > W + 200 || this.y < -300 || this.y > H + 300) this.reset(false);
  }

  draw() {
    if (this.tail.length < 2) return;
    const start = this.tail[0], end = this.tail[this.tail.length - 1];

    // glow pass
    ctx.beginPath();
    ctx.moveTo(start.x, start.y);
    for (let i = 1; i < this.tail.length; i++) {
      const mx = (this.tail[i-1].x + this.tail[i].x) / 2;
      const my = (this.tail[i-1].y + this.tail[i].y) / 2;
      ctx.quadraticCurveTo(this.tail[i-1].x, this.tail[i-1].y, mx, my);
    }
    const g1 = ctx.createLinearGradient(start.x, start.y, end.x, end.y);
    g1.addColorStop(0,   `hsla(${this.hue},${this.sat}%,${this.lit}%,0)`);
    g1.addColorStop(0.5, `hsla(${this.hue},${this.sat}%,${this.lit}%,${this.alpha * 0.3})`);
    g1.addColorStop(1,   `hsla(${this.hue},${this.sat}%,${this.lit}%,0)`);
    ctx.strokeStyle = g1;
    ctx.lineWidth = this.width * 4;
    ctx.lineCap = ctx.lineJoin = 'round';
    ctx.stroke();

    // core pass
    ctx.beginPath();
    ctx.moveTo(start.x, start.y);
    for (let i = 1; i < this.tail.length; i++) {
      const mx = (this.tail[i-1].x + this.tail[i].x) / 2;
      const my = (this.tail[i-1].y + this.tail[i].y) / 2;
      ctx.quadraticCurveTo(this.tail[i-1].x, this.tail[i-1].y, mx, my);
    }
    const g2 = ctx.createLinearGradient(start.x, start.y, end.x, end.y);
    g2.addColorStop(0,   `hsla(${this.hue},${this.sat}%,${this.lit}%,0)`);
    g2.addColorStop(0.4, `hsla(${this.hue},${this.sat}%,${this.lit}%,${this.alpha})`);
    g2.addColorStop(0.7, `hsla(${this.hue},${this.sat}%,${Math.min(this.lit+20,80)}%,${this.alpha})`);
    g2.addColorStop(1,   `hsla(${this.hue},${this.sat}%,${this.lit+10}%,0)`);
    ctx.strokeStyle = g2;
    ctx.lineWidth = this.width;
    ctx.lineCap = ctx.lineJoin = 'round';
    ctx.stroke();
  }
}

for (let i = 0; i < RIBBON_COUNT; i++) ribbons.push(new Ribbon());

let vignetteCache = null;
function drawVignette() {
  if (!vignetteCache || vignetteCache.w !== W || vignetteCache.h !== H) {
    const tmp = document.createElement('canvas');
    tmp.width = W; tmp.height = H;
    const tc = tmp.getContext('2d');
    const g  = tc.createRadialGradient(W/2, H/2, H*0.1, W/2, H/2, H*0.85);
    g.addColorStop(0, 'rgba(0,0,0,0)');
    g.addColorStop(1, 'rgba(0,0,0,0.72)');
    tc.fillStyle = g;
    tc.fillRect(0, 0, W, H);
    vignetteCache = { img: tmp, w: W, h: H };
  }
  ctx.drawImage(vignetteCache.img, 0, 0);
}

function loop() {
  ctx.clearRect(0, 0, W, H);
  const bloom = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.6);
  bloom.addColorStop(0, 'rgba(180,8,25,0.18)');
  bloom.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bloom;
  ctx.fillRect(0, 0, W, H);
  ribbons.forEach(r => { r.update(); r.draw(); });
  drawVignette();
  requestAnimationFrame(loop);
}
loop();
</script>
